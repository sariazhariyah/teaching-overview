<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Bahan Ajar - SITTA UT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                📚 <span>SITTA</span> UT
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html">🏠 Dashboard</a></li>
                    <li class="active"><a href="stok.html">📦 Stok</a></li>
                    <li><a href="tracking.html">📊 Tracking</a></li>
                    <li><a href="index.html">🚪 Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="table-container">
            <h3 style="margin-bottom: 1rem;">📦 Informasi Stok Bahan Ajar</h3>
            
            <!-- Form Tambah Stok -->
            <form id="addStokForm" class="add-stok-form">
                <h4>➕ Tambah Stok Baru</h4>
                <div class="form-group">
                    <label>Kode Lokasi:</label>
                    <input type="text" id="newKodeLokasi" required>
                </div>
                <div class="form-group">
                    <label>Kode Barang:</label>
                    <input type="text" id="newKodeBarang" required>
                </div>
                <div class="form-group">
                    <label>Nama Barang:</label>
                    <input type="text" id="newNamaBarang" required>
                </div>
                <div class="form-group">
                    <label>Jenis Barang:</label>
                    <select id="newJenisBarang" required>
                        <option value="">Pilih Jenis</option>
                        <option value="BMP">BMP</option>
                        <option value="Modul">Modul</option>
                        <option value="Buku Pendukung">Buku Pendukung</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Edisi:</label>
                    <input type="number" id="newEdisi" min="1" required>
                </div>
                <div class="form-group">
                    <label>Stok:</label>
                    <input type="number" id="newStok" min="0" required>
                </div>
                <button type="submit" class="btn">Tambah Stok</button>
            </form>

            <!-- Tabel Stok -->
            <table>
                <thead>
                    <tr>
                        <th>Kode Lokasi</th>
                        <th>Kode Barang</th>
                        <th>Nama Barang</th>
                        <th>Jenis</th>
                        <th>Edisi</th>
                        <th>Stok</th>
                        <th>Cover</th>
                    </tr>
                </thead>
                <tbody id="stokTableBody">
                    <!-- Data akan dimuat oleh JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
